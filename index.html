<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
:root {
    --bg: #FAFAFA; --text: #333; --sub: #8E8E93; --accent: #0055AA;
    --inp: #FFF; --ctrl: #EEEEEF; --r: 8px;
    --shadow: 0 2px 10px rgba(0,0,0,0.05);
    --vis-border: #0055AA; --vis-bg: rgba(0,85,170,0.08);
}
[data-theme="dark"] {
    --bg: #121212; --text: #F0F0F0; --sub: #AAAAAA; --accent: #409CFF;
    --inp: #1C1C1E; --ctrl: #2C2C2E;
    --vis-border: #409CFF; --vis-bg: rgba(64,156,255,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;display:flex;justify-content:center;min-height:100vh;padding:20px;transition:background 0.3s,color 0.3s;}
.container{width:100%;max-width:500px;margin:0 auto;padding-bottom:40px;}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:0 4px;}
h1{font-weight:700;font-size:20px;letter-spacing:-0.5px;}
.top-controls{display:flex;gap:12px;align-items:center;}
.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);}
.lang-select{background:var(--ctrl);border:none;border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-weight:600;appearance:none;}
.tab-bar{display:flex;background:var(--ctrl);padding:4px;border-radius:10px;margin-bottom:24px;gap:2px;}
.tab-btn{flex:1;text-align:center;padding:7px 2px;font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;border-radius:7px;transition:all 0.2s;white-space:nowrap;}
.tab-btn.active{background:var(--inp);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.form-section{display:flex;flex-direction:column;gap:16px;margin-bottom:24px;}
label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--sub);margin-bottom:6px;letter-spacing:0.5px;}
.input-wrapper{position:relative;}
input,select{width:100%;padding:12px 14px;font-size:16px;font-family:inherit;color:var(--text);background:var(--inp);border:1px solid transparent;border-radius:var(--r);box-shadow:var(--shadow);transition:all 0.2s;appearance:none;}
input:focus,select:focus{outline:none;border-color:var(--accent);}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.suffix{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--sub);pointer-events:none;}

/* ===== F値ウィジェット ===== */
.fnum-widget{
    background:var(--inp);border-radius:12px;box-shadow:var(--shadow);
    padding:16px 14px 12px;
}
.fnum-display{
    text-align:center;margin-bottom:12px;line-height:1;
}
.fnum-prefix-lg{
    font-size:16px;font-weight:700;color:var(--sub);vertical-align:middle;margin-right:2px;
}
.fnum-big{
    font-size:48px;font-weight:800;color:var(--accent);letter-spacing:-2px;vertical-align:middle;
    transition:all 0.15s;
}
.fnum-slider-row{
    display:flex;align-items:center;gap:8px;
}
.fnum-label-min{font-size:10px;color:var(--sub);white-space:nowrap;font-weight:600;}
.fnum-label-max{font-size:10px;color:var(--sub);white-space:nowrap;font-weight:600;}
.fnum-slider-wrap{flex:1;position:relative;}
.fnum-slider-wrap input[type="range"]{
    width:100%;height:6px;padding:0;margin:0;
    background:none;border:none;box-shadow:none;
    accent-color:var(--accent);cursor:pointer;
}
/* tick marks under slider */
.fnum-ticks{
    display:flex;justify-content:space-between;
    padding:0 2px;margin-top:3px;
}
.fnum-tick{
    width:1px;height:4px;background:var(--ctrl);border-radius:1px;
    transition:background 0.15s;
}
.fnum-tick.active{background:var(--accent);opacity:0.5;}

/* ===== 共通results ===== */
.results-card{background:var(--inp);border-radius:16px;padding:24px;box-shadow:var(--shadow);text-align:center;margin-bottom:20px;}
.primary-result{margin-bottom:20px;}
.result-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px;}
.result-value{font-size:42px;font-weight:800;color:var(--accent);letter-spacing:-1px;line-height:1;}
.result-unit{font-size:18px;font-weight:500;color:var(--sub);margin-left:2px;}
.grid-results{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.grid-item{background:var(--ctrl);border-radius:8px;padding:8px 4px;}
.grid-item .val{font-size:15px;font-weight:600;color:var(--text);}
.grid-item .lbl{font-size:9px;color:var(--sub);text-transform:uppercase;margin-top:2px;}
.badge{display:inline-flex;align-items:center;padding:4px 12px;background:var(--accent);color:#FFF;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;}
.vis-container{width:100%;padding-top:16px;display:flex;flex-direction:column;align-items:center;}
.vis-box{border:2px solid var(--vis-border);background:var(--vis-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.4s cubic-bezier(0.2,0.8,0.2,1);margin-bottom:8px;min-width:50px;min-height:30px;}
.vis-range-text{font-size:14px;color:var(--accent);font-weight:700;text-align:center;line-height:1.2;padding:4px;}
.vis-range-label{font-size:9px;opacity:0.8;font-weight:400;display:block;}
.vis-sensor-info{font-size:10px;color:var(--sub);font-family:"SF Mono","Menlo",monospace;text-align:center;margin-bottom:2px;}
.vis-model-info{font-size:11px;font-weight:600;color:var(--text);text-align:center;}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>Camera Calculator</h1>
        <div class="top-controls">
            <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">&#9728;</button>
            <select id="lang-select" class="lang-select" onchange="updateLanguage()">
                <option value="ja" selected>JP</option>
                <option value="en">EN</option>
            </select>
        </div>
    </header>

    <div class="tab-bar">
        <div class="tab-btn active" id="tab-fov" onclick="switchTab('fov')">撮影範囲</div>
        <div class="tab-btn" id="tab-focal" onclick="switchTab('focal')">焦点距離</div>
        <div class="tab-btn" id="tab-dist" onclick="switchTab('dist')">必要距離</div>
        <div class="tab-btn" id="tab-dof" onclick="switchTab('dof')">被写界深度</div>
    </div>

    <!-- TAB: 撮影範囲 -->
    <div class="tab-panel active" id="panel-fov">
        <div class="form-section">
            <div><label id="lbl-fov-sensor">センサー機種</label><div class="input-wrapper"><select id="fov-sensor" onchange="calcFov()"></select><span class="suffix">&#9660;</span></div></div>
            <div><label id="lbl-fov-focal">レンズ焦点距離 (mm)</label><div class="input-wrapper"><input type="number" id="fov-focal" placeholder="ex. 50" inputmode="decimal" oninput="calcFov()"><span class="suffix">mm</span></div></div>
            <div><label id="lbl-fov-dist">WD / 撮影距離 (mm)</label><div class="input-wrapper"><input type="number" id="fov-dist" placeholder="ex. 3000" inputmode="decimal" oninput="calcFov()"><span class="suffix">mm</span></div></div>
        </div>
        <div class="results-card">
            <div class="primary-result">
                <div class="result-label" id="fov-res-label">撮影範囲 (幅)</div>
                <div><span class="result-value" id="fov-res-main">---</span><span class="result-unit">mm</span></div>
            </div>
            <div class="grid-results">
                <div class="grid-item"><div class="val" id="fov-res-h">---</div><div class="lbl">HEIGHT (mm)</div></div>
                <div class="grid-item"><div class="val" id="fov-res-aov">---°</div><div class="lbl">ANGLE (H)</div></div>
                <div class="grid-item"><div class="val" id="fov-res-mag">---</div><div class="lbl">MAG (x)</div></div>
            </div>
            <div class="vis-container">
                <div class="vis-box" id="fov-vis-box"><span class="vis-range-text" id="fov-vis-text"></span></div>
                <div class="vis-sensor-info" id="fov-vis-sensor"></div>
                <div class="vis-model-info" id="fov-vis-model"></div>
            </div>
        </div>
    </div>

    <!-- TAB: 焦点距離 -->
    <div class="tab-panel" id="panel-focal">
        <div class="form-section">
            <div><label id="lbl-focal-sensor">センサー機種</label><div class="input-wrapper"><select id="focal-sensor" onchange="calcFocal()"></select><span class="suffix">&#9660;</span></div></div>
            <div><label id="lbl-focal-target">撮りたい幅 (mm)</label><div class="input-wrapper"><input type="number" id="focal-target" placeholder="ex. 2000" inputmode="decimal" oninput="calcFocal()"><span class="suffix">mm</span></div></div>
            <div><label id="lbl-focal-dist">WD / 撮影距離 (mm)</label><div class="input-wrapper"><input type="number" id="focal-dist" placeholder="ex. 3000" inputmode="decimal" oninput="calcFocal()"><span class="suffix">mm</span></div></div>
        </div>
        <div class="results-card">
            <div class="primary-result">
                <div class="result-label" id="focal-res-label">必要な焦点距離</div>
                <div><span class="result-value" id="focal-res-main">---</span><span class="result-unit">mm</span></div>
                <div id="focal-rec-badge" style="display:none;"><span class="badge">Rec: <span id="focal-rec-val">50mm</span></span></div>
            </div>
            <div class="grid-results">
                <div class="grid-item"><div class="val" id="focal-res-h">---</div><div class="lbl">HEIGHT (mm)</div></div>
                <div class="grid-item"><div class="val" id="focal-res-aov">---°</div><div class="lbl">ANGLE (H)</div></div>
                <div class="grid-item"><div class="val" id="focal-res-mag">---</div><div class="lbl">MAG (x)</div></div>
            </div>
            <div class="vis-container">
                <div class="vis-box" id="focal-vis-box"><span class="vis-range-text" id="focal-vis-text"></span></div>
                <div class="vis-sensor-info" id="focal-vis-sensor"></div>
                <div class="vis-model-info" id="focal-vis-model"></div>
            </div>
        </div>
    </div>

    <!-- TAB: 必要距離 -->
    <div class="tab-panel" id="panel-dist">
        <div class="form-section">
            <div><label id="lbl-dist-sensor">センサー機種</label><div class="input-wrapper"><select id="dist-sensor" onchange="calcDist()"></select><span class="suffix">&#9660;</span></div></div>
            <div><label id="lbl-dist-focal">レンズ焦点距離 (mm)</label><div class="input-wrapper"><input type="number" id="dist-focal" placeholder="ex. 50" inputmode="decimal" oninput="calcDist()"><span class="suffix">mm</span></div></div>
            <div><label id="lbl-dist-target">撮りたい幅 (mm)</label><div class="input-wrapper"><input type="number" id="dist-target" placeholder="ex. 2000" inputmode="decimal" oninput="calcDist()"><span class="suffix">mm</span></div></div>
        </div>
        <div class="results-card">
            <div class="primary-result">
                <div class="result-label" id="dist-res-label">必要な距離</div>
                <div><span class="result-value" id="dist-res-main">---</span><span class="result-unit">mm</span></div>
            </div>
            <div class="grid-results">
                <div class="grid-item"><div class="val" id="dist-res-h">---</div><div class="lbl">HEIGHT (mm)</div></div>
                <div class="grid-item"><div class="val" id="dist-res-aov">---°</div><div class="lbl">ANGLE (H)</div></div>
                <div class="grid-item"><div class="val" id="dist-res-mag">---</div><div class="lbl">MAG (x)</div></div>
            </div>
            <div class="vis-container">
                <div class="vis-box" id="dist-vis-box"><span class="vis-range-text" id="dist-vis-text"></span></div>
                <div class="vis-sensor-info" id="dist-vis-sensor"></div>
                <div class="vis-model-info" id="dist-vis-model"></div>
            </div>
        </div>
    </div>

    <!-- TAB: 被写界深度 -->
    <div class="tab-panel" id="panel-dof">
        <div class="form-section">
            <div><label id="lbl-dof-sensor">センサー機種</label><div class="input-wrapper"><select id="dof-sensor" onchange="calcDof()"></select><span class="suffix">&#9660;</span></div></div>
            <div><label id="lbl-dof-focal">レンズ焦点距離 (mm)</label><div class="input-wrapper"><input type="number" id="dof-focal" placeholder="ex. 50" inputmode="decimal" oninput="calcDof()"><span class="suffix">mm</span></div></div>

            <!-- F値ウィジェット -->
            <div>
                <label id="lbl-dof-fnum">絞り値 (F値)</label>
                <div class="fnum-widget">
                    <div class="fnum-display">
                        <span class="fnum-prefix-lg">F</span><span class="fnum-big" id="fnum-big">5.6</span>
                    </div>
                    <div class="fnum-slider-row">
                        <span class="fnum-label-min">F1.0</span>
                        <div class="fnum-slider-wrap">
                            <input type="range" id="dof-fslider" min="0" max="15" step="1" value="8" oninput="onFslider()">
                            <div class="fnum-ticks" id="fnum-ticks"></div>
                        </div>
                        <span class="fnum-label-max">F22</span>
                    </div>
                </div>
            </div>

            <div><label id="lbl-dof-dist">撮影距離 (mm)</label><div class="input-wrapper"><input type="number" id="dof-dist" placeholder="ex. 3000" inputmode="decimal" oninput="calcDof()"><span class="suffix">mm</span></div></div>
            <div><label id="lbl-dof-coc">許容錯乱円径（自動）</label><div class="input-wrapper"><input type="text" id="dof-coc-display" readonly tabindex="-1" style="color:var(--sub);background:var(--ctrl);cursor:default;"><span class="suffix">mm</span></div></div>
        </div>
        <div class="results-card">
            <div class="primary-result">
                <div class="result-label" id="dof-res-label">被写界深度</div>
                <div><span class="result-value" id="dof-res-total">---</span><span class="result-unit" id="dof-unit">mm</span></div>
            </div>
        </div>
    </div>
</div>

<script>
const sensors={
    'acs1':{w:28.16,h:19.71,px:22},'go4k':{w:20.74,h:9.79,px:4.5},
    'go5m':{w:23.04,h:18.14,px:9},'go12':{w:22.18,h:19.71,px:22},
    'hx7s':{w:28.16,h:21.12,px:11},'q2m':{w:19.20,h:10.80,px:10},
    'q1v':{w:7.17,h:5.38,px:11},'ucam':{w:4.74,h:3.55,px:7.4},
    'full':{w:36,h:24,px:8.4},'aps-c':{w:23.5,h:15.6,px:3.9},
    'm43':{w:17.3,h:13,px:3.3},'1inch':{w:13.2,h:8.8,px:2.4}
};
const sensorOptions=[
    {group:'Industrial Models',items:[
        {v:'acs1',t:'ACS-1 (1280x896 / 22μm)'},{v:'go4k',t:'GO-4K (4608x2176 / 4.5μm)'},
        {v:'go5m',t:'GO-5M (2560x2016 / 9μm)'},{v:'go12',t:'GO-12 (1008x896 / 22μm)'},
        {v:'hx7s',t:'HX-7s (2560x1920 / 11μm)'},{v:'q2m',t:'Q2m/M-Cam (1920x1080 / 10μm)'},
        {v:'q1v',t:'Q1v (640x480 / 11μm)'},{v:'ucam',t:'u-cam (640x480 / 7.4μm)'}
    ]},
    {group:'General Formats',items:[
        {v:'full',t:'Full Frame (35mm)'},{v:'aps-c',t:'APS-C (Sony/Nikon)'},
        {v:'m43',t:'Micro 4/3'},{v:'1inch',t:'1 inch'}
    ]}
];
const fStops=[1.0,1.2,1.4,1.8,2.0,2.8,3.5,4.0,5.6,6.3,7.1,8.0,11,13,16,22];
const T={
    ja:{
        tab_fov:'撮影範囲',tab_focal:'焦点距離',tab_dist:'必要距離',tab_dof:'被写界深度',
        lbl_sensor:'センサー機種',lbl_focal_len:'レンズ焦点距離 (mm)',
        lbl_dist:'WD / 撮影距離 (mm)',lbl_target:'撮りたい幅 (mm)',
        lbl_fnum:'絞り値 (F値)',lbl_shoot_dist:'撮影距離 (mm)',lbl_coc:'許容錯乱円径（自動）',
        res_fov:'撮影範囲 (幅)',res_focal:'必要な焦点距離',res_dist:'必要な距離',res_dof:'被写界深度',
        vis_label:'撮影範囲',inf:'∞'
    },
    en:{
        tab_fov:'FOV',tab_focal:'Focal Len',tab_dist:'Distance',tab_dof:'DoF',
        lbl_sensor:'Sensor Model',lbl_focal_len:'Focal Length (mm)',
        lbl_dist:'WD / Shoot Dist (mm)',lbl_target:'Target Width (mm)',
        lbl_fnum:'F Number',lbl_shoot_dist:'Shooting Distance (mm)',lbl_coc:'Circle of Confusion (auto)',
        res_fov:'Shooting Width',res_focal:'Required Focal Len',res_dist:'Required Distance',res_dof:'Depth of Field',
        vis_label:'Range',inf:'∞'
    }
};
let lang='ja';
const el=id=>document.getElementById(id);

function buildSensorSelects(){
    ['fov-sensor','focal-sensor','dist-sensor','dof-sensor'].forEach(sid=>{
        const sel=el(sid);sel.innerHTML='';
        sensorOptions.forEach(g=>{
            const og=document.createElement('optgroup');og.label=g.group;
            g.items.forEach(it=>{const o=document.createElement('option');o.value=it.v;o.text=it.t;og.appendChild(o);});
            sel.appendChild(og);
        });
    });
}

function buildTicks(){
    const wrap=el('fnum-ticks');
    wrap.innerHTML='';
    fStops.forEach((_,i)=>{
        const d=document.createElement('div');
        d.className='fnum-tick';
        d.id='tick-'+i;
        wrap.appendChild(d);
    });
}

function updateTicks(idx){
    fStops.forEach((_,i)=>{
        const t=el('tick-'+i);
        if(t) t.classList.toggle('active', i<=idx);
    });
}

function switchTab(tab){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    el('tab-'+tab).classList.add('active');el('panel-'+tab).classList.add('active');
}
function getSensor(selId){
    const v=el(selId).value;const s=sensors[v];
    return{sw:s?s.w:0,sh:s?s.h:0,name:el(selId).options[el(selId).selectedIndex].text};
}
function updateVisBox(boxId,textId,sensorId,modelId,w,h,sw,sh,modelName,label,valid){
    const MAX_W=280,MAX_H=140;const src=valid?{w,h}:{w:sw,h:sh};
    if(src.w<=0||src.h<=0)return;
    const ratio=src.w/src.h;let fw,fh;
    if(MAX_W/MAX_H>ratio){fh=MAX_H;fw=MAX_H*ratio;}else{fw=MAX_W;fh=MAX_W/ratio;}
    el(boxId).style.width=fw+'px';el(boxId).style.height=fh+'px';
    el(textId).innerHTML=valid?'<span class="vis-range-label">'+label+'</span>'+w.toFixed(0)+' x '+h.toFixed(0)+' mm':'';
    el(sensorId).innerText=sw>0?'Sensor: '+sw+' x '+sh+' mm':'';
    el(modelId).innerText=modelName;
}
function fmtMag(mag){return mag>1?mag.toFixed(3)+'x':'1/'+Math.round(1/mag);}
function fmtVal(v){
    if(v===Infinity)return{val:T[lang].inf,unit:''};
    if(v>=1000000)return{val:(v/1000000).toFixed(2),unit:'km'};
    if(v>=1000)return{val:(v/1000).toFixed(3),unit:'m'};
    return{val:v.toFixed(1),unit:'mm'};
}

function calcFov(){
    const{sw,sh,name}=getSensor('fov-sensor');
    const focal=parseFloat(el('fov-focal').value)||0;
    const dist=parseFloat(el('fov-dist').value)||0;
    const t=T[lang];let valid=false,vW=0,vH=0,vMag=0,vAov=0;
    if(sw>0&&focal>0&&dist>0){vW=(sw*dist)/focal;vH=(sh*dist)/focal;vMag=sw/vW;vAov=2*Math.atan(sw/(2*focal))*(180/Math.PI);valid=true;}
    else if(sw>0&&focal>0){vAov=2*Math.atan(sw/(2*focal))*(180/Math.PI);}
    el('fov-res-main').innerText=valid?vW.toFixed(1):'---';
    el('fov-res-h').innerText=valid?vH.toFixed(1):'---';
    el('fov-res-aov').innerText=vAov>0?vAov.toFixed(1)+'°':'---°';
    el('fov-res-mag').innerText=valid?fmtMag(vMag):'---';
    updateVisBox('fov-vis-box','fov-vis-text','fov-vis-sensor','fov-vis-model',vW,vH,sw,sh,name,t.vis_label,valid);
}
function calcFocal(){
    const{sw,sh,name}=getSensor('focal-sensor');
    const target=parseFloat(el('focal-target').value)||0;
    const dist=parseFloat(el('focal-dist').value)||0;
    const t=T[lang];let valid=false,vF=0,vH=0,vMag=0,vAov=0;
    if(sw>0&&target>0&&dist>0){
        vF=(sw*dist)/target;vH=target*(sh/sw);vMag=sw/target;
        vAov=2*Math.atan(sw/(2*vF))*(180/Math.PI);valid=true;
        const lenses=[16,25,35,50,75,85,100,135,200];
        const c=lenses.reduce((p,v)=>Math.abs(v-vF)<Math.abs(p-vF)?v:p);
        el('focal-rec-val').innerText=c+'mm';el('focal-rec-badge').style.display='block';
    }else{el('focal-rec-badge').style.display='none';}
    el('focal-res-main').innerText=valid?vF.toFixed(1):'---';
    el('focal-res-h').innerText=valid?vH.toFixed(1):'---';
    el('focal-res-aov').innerText=vAov>0?vAov.toFixed(1)+'°':'---°';
    el('focal-res-mag').innerText=valid?fmtMag(vMag):'---';
    updateVisBox('focal-vis-box','focal-vis-text','focal-vis-sensor','focal-vis-model',target,vH,sw,sh,name,t.vis_label,valid);
}
function calcDist(){
    const{sw,sh,name}=getSensor('dist-sensor');
    const focal=parseFloat(el('dist-focal').value)||0;
    const target=parseFloat(el('dist-target').value)||0;
    const t=T[lang];let valid=false,vD=0,vH=0,vMag=0,vAov=0;
    if(sw>0&&focal>0&&target>0){vD=(target*focal)/sw;vH=target*(sh/sw);vMag=sw/target;vAov=2*Math.atan(sw/(2*focal))*(180/Math.PI);valid=true;}
    else if(sw>0&&focal>0){vAov=2*Math.atan(sw/(2*focal))*(180/Math.PI);}
    el('dist-res-main').innerText=valid?vD.toFixed(1):'---';
    el('dist-res-h').innerText=valid?vH.toFixed(1):'---';
    el('dist-res-aov').innerText=vAov>0?vAov.toFixed(1)+'°':'---°';
    el('dist-res-mag').innerText=valid?fmtMag(vMag):'---';
    updateVisBox('dist-vis-box','dist-vis-text','dist-vis-sensor','dist-vis-model',target,vH,sw,sh,name,t.vis_label,valid);
}

function onFslider(){
    const idx=parseInt(el('dof-fslider').value);
    const f=fStops[idx];
    el('fnum-big').innerText=f%1===0?f.toFixed(0):f;
    updateTicks(idx);
    calcDof();
}

function calcDof(){
    const sKey=el('dof-sensor').value;const s=sensors[sKey];
    const px=s?s.px:null;
    const coc=px?px*0.001:null;
    el('dof-coc-display').value=coc?coc.toFixed(4):'---';
    const focal=parseFloat(el('dof-focal').value)||0;
    const fnum=parseFloat(el('dof-fnum-hidden').value)||fStops[parseInt(el('dof-fslider').value)];
    const d=parseFloat(el('dof-dist').value)||0;
    if(!coc||focal<=0||fnum<=0||d<=0){el('dof-res-total').innerText='---';el('dof-unit').innerText='mm';return;}
    const Fc=fnum*coc;
    const nearDof=(d*d*Fc)/(focal*focal+Fc*d);
    const denomFar=focal*focal-Fc*d;
    let total;
    if(denomFar<=0){total=Infinity;}else{total=nearDof+(d*d*Fc)/denomFar;}
    const{val,unit}=fmtVal(total);
    el('dof-res-total').innerText=val;
    el('dof-unit').innerText=unit;
}

function updateLanguage(){
    lang=el('lang-select').value;const t=T[lang];
    el('tab-fov').innerText=t.tab_fov;el('tab-focal').innerText=t.tab_focal;
    el('tab-dist').innerText=t.tab_dist;el('tab-dof').innerText=t.tab_dof;
    el('lbl-fov-sensor').innerText=t.lbl_sensor;el('lbl-fov-focal').innerText=t.lbl_focal_len;el('lbl-fov-dist').innerText=t.lbl_dist;
    el('lbl-focal-sensor').innerText=t.lbl_sensor;el('lbl-focal-target').innerText=t.lbl_target;el('lbl-focal-dist').innerText=t.lbl_dist;
    el('lbl-dist-sensor').innerText=t.lbl_sensor;el('lbl-dist-focal').innerText=t.lbl_focal_len;el('lbl-dist-target').innerText=t.lbl_target;
    el('lbl-dof-sensor').innerText=t.lbl_sensor;el('lbl-dof-focal').innerText=t.lbl_focal_len;
    el('lbl-dof-fnum').innerText=t.lbl_fnum;el('lbl-dof-dist').innerText=t.lbl_shoot_dist;
    el('lbl-dof-coc').innerText=t.lbl_coc;el('dof-res-label').innerText=t.res_dof;
    el('fov-res-label').innerText=t.res_fov;el('focal-res-label').innerText=t.res_focal;el('dist-res-label').innerText=t.res_dist;
    calcFov();calcFocal();calcDist();calcDof();
}
function toggleTheme(){
    const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    el('theme-btn').innerText=next==='dark'?'🌙':'☀';
}

function init(){
    buildSensorSelects();
    buildTicks();
    // hidden input for fnum value used in calcDof
    const h=document.createElement('input');
    h.type='hidden';h.id='dof-fnum-hidden';h.value=fStops[8];
    document.body.appendChild(h);
    el('dof-fslider').value=8;
    el('fnum-big').innerText=fStops[8];
    updateTicks(8);
    updateLanguage();
}

// onFslider も hidden に書く
const _orig=onFslider;
window.onFslider=function(){
    const idx=parseInt(el('dof-fslider').value);
    const f=fStops[idx];
    el('fnum-big').innerText=f%1===0?f.toFixed(0):f;
    const h=el('dof-fnum-hidden');if(h)h.value=f;
    updateTicks(idx);
    calcDof();
};

init();
</script>
</body>
